<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Studio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap');

:root {
  --bg-primary:    #0a0a0f;
  --bg-secondary:  #13131a;
  --bg-tertiary:   #1a1a24;
  --bg-hover:      #21212e;
  --accent:        #e6b17e;
  --accent2:       #d4a574;
  --text-primary:  #e8e8ed;
  --text-secondary:#a0a0b0;
  --text-muted:    #6e6e7e;
  --border:        #2a2a38;
  --user-msg:      #2d3748;
  --ai-msg:        #1e2533;
  --danger:        #e05c5c;
  --success:       #5cb85c;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg-primary);color:var(--text-primary);height:100vh;overflow:hidden}

/* ── AUTH SCREEN ─────────────────────────────────────────── */
#authScreen{
  position:fixed;inset:0;background:linear-gradient(135deg,#0a0a0f 0%,#13131a 60%,#0f0f15 100%);
  display:flex;align-items:center;justify-content:center;z-index:9000;
}
#authScreen.hidden{display:none}
.auth-card{
  background:var(--bg-secondary);border:1px solid var(--border);border-radius:20px;
  padding:44px 48px;width:420px;max-width:95vw;
  box-shadow:0 32px 80px rgba(0,0,0,.55);animation:fadeUp .3s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.auth-logo{font-family:'Crimson Pro',serif;font-size:34px;font-weight:600;color:var(--accent);text-align:center;margin-bottom:4px}
.auth-sub{font-size:12px;color:var(--text-muted);text-align:center;letter-spacing:.5px;margin-bottom:32px}
.auth-tabs{display:flex;gap:0;background:var(--bg-tertiary);border-radius:10px;padding:4px;margin-bottom:28px}
.auth-tab{flex:1;padding:9px;border:none;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;background:none;color:var(--text-muted)}
.auth-tab.active{background:var(--bg-secondary);color:var(--accent);box-shadow:0 1px 6px rgba(0,0,0,.3)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;letter-spacing:.3px}
.form-input{
  width:100%;padding:12px 14px;background:var(--bg-tertiary);color:var(--text-primary);
  border:1px solid var(--border);border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;transition:all .2s
}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(230,177,126,.1)}
.form-input::placeholder{color:var(--text-muted)}
.auth-btn{
  width:100%;padding:13px;margin-top:8px;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
  color:var(--bg-primary);border:none;border-radius:9px;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(230,177,126,.25)
}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(230,177,126,.35)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.auth-error{
  margin-top:12px;padding:10px 14px;background:rgba(224,92,92,.1);border:1px solid rgba(224,92,92,.3);
  border-radius:8px;font-size:13px;color:#e88;display:none
}

/* ── MAIN APP ─────────────────────────────────────────────── */
.app{display:flex;height:100vh;display:none}
.app.visible{display:flex}

/* Sidebar */
.sidebar{width:280px;background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:20px 16px 14px;border-bottom:1px solid var(--border)}
.logo{font-family:'Crimson Pro',serif;font-size:24px;font-weight:600;color:var(--accent);margin-bottom:2px}
.logo-sub{font-size:11px;color:var(--text-muted)}
.user-badge{
  display:flex;align-items:center;gap:8px;margin-top:12px;padding:8px 10px;
  background:var(--bg-tertiary);border-radius:8px;font-size:13px;
}
.user-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--bg-primary);flex-shrink:0}
.user-name{flex:1;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;padding:2px;transition:color .2s;flex-shrink:0}
.logout-btn:hover{color:var(--danger)}
.new-chat-btn{
  width:calc(100% - 24px);margin:12px 12px 4px;padding:11px;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
  color:var(--bg-primary);border:none;border-radius:9px;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;box-shadow:0 3px 10px rgba(230,177,126,.2)
}
.new-chat-btn:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(230,177,126,.3)}

/* Conversation list */
.conv-list{flex:1;overflow-y:auto;padding:6px 8px}
.conv-item{
  position:relative;padding:11px 36px 11px 12px;margin-bottom:4px;
  background:var(--bg-tertiary);border:1px solid transparent;border-radius:8px;
  cursor:pointer;transition:all .2s;
}
.conv-item:hover{background:var(--bg-hover);border-color:var(--border)}
.conv-item.active{background:var(--bg-hover);border-color:var(--accent)}
.conv-title{font-size:13px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.conv-preview{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Three-dot menu */
.conv-menu-btn{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  width:24px;height:24px;background:none;border:none;border-radius:5px;
  color:var(--text-muted);font-size:16px;cursor:pointer;
  display:none;align-items:center;justify-content:center;transition:all .2s;line-height:1
}
.conv-item:hover .conv-menu-btn,.conv-item.active .conv-menu-btn{display:flex}
.conv-menu-btn:hover{background:var(--bg-primary);color:var(--text-primary)}
.conv-dropdown{
  position:fixed;background:var(--bg-secondary);border:1px solid var(--border);
  border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:1000;
  min-width:140px;overflow:hidden;display:none
}
.conv-dropdown.open{display:block;animation:fadeUp .15s ease}
.conv-dropdown-item{
  display:flex;align-items:center;gap:9px;width:100%;padding:10px 14px;
  background:none;border:none;font-size:13px;color:var(--text-primary);
  cursor:pointer;transition:background .15s;text-align:left
}
.conv-dropdown-item:hover{background:var(--bg-hover)}
.conv-dropdown-item.danger{color:var(--danger)}
.conv-dropdown-item.danger:hover{background:rgba(224,92,92,.1)}

/* Sidebar footer */
.sidebar-footer{padding:10px 8px 14px;border-top:1px solid var(--border)}
.sidebar-footer-btn{
  width:100%;padding:9px 12px;background:none;border:1px solid var(--border);border-radius:8px;
  color:var(--text-muted);font-size:12px;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:7px
}
.sidebar-footer-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Main content */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-header{
  padding:16px 28px;background:var(--bg-secondary);border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0
}
.chat-header h2{font-family:'Crimson Pro',serif;font-size:22px}
.header-right{display:flex;align-items:center;gap:10px}
.model-select{
  padding:8px 14px;background:var(--bg-tertiary);color:var(--text-primary);
  border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s
}
.model-select:focus,.model-select:hover{border-color:var(--accent);outline:none}
.settings-btn{
  width:36px;height:36px;background:var(--bg-tertiary);border:1px solid var(--border);
  border-radius:8px;color:var(--text-secondary);font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s
}
.settings-btn:hover{border-color:var(--accent);color:var(--accent);transform:rotate(25deg)}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:28px 32px;scroll-behavior:smooth}
.message{margin-bottom:22px;animation:fadeUp .25s ease}
.msg-header{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.user-avatar-msg{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.ai-avatar-msg{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg-primary)}
.msg-sender{font-weight:600;font-size:13px}
.msg-body{margin-left:39px;padding:14px 18px;border-radius:11px;line-height:1.65;max-width:820px}
.user-message .msg-body{background:var(--user-msg);border-left:3px solid #667eea}
.ai-message .msg-body{background:var(--ai-msg);border-left:3px solid var(--accent)}
.msg-body pre{background:var(--bg-primary);padding:12px;border-radius:6px;overflow-x:auto;margin:8px 0}
.msg-body code{font-family:'Courier New',monospace;font-size:13px}
.msg-body h1{font-family:'Crimson Pro',serif;font-size:22px;font-weight:600;color:var(--accent);margin:16px 0 8px}
.msg-body h2{font-family:'Crimson Pro',serif;font-size:18px;font-weight:600;color:var(--accent);margin:14px 0 6px}
.msg-body h3{font-size:15px;font-weight:700;margin:12px 0 5px}
.msg-body h4{font-size:14px;font-weight:700;color:var(--text-secondary);margin:10px 0 4px}
.msg-body strong{font-weight:700}
.msg-body em{font-style:italic;color:var(--text-secondary)}
.msg-body ul,.msg-body ol{padding-left:20px;margin:6px 0}
.msg-body li{margin:4px 0;line-height:1.6}
.msg-body ul li{list-style:disc}.msg-body ol li{list-style:decimal}
.msg-body blockquote{border-left:3px solid var(--accent);margin:10px 0;padding:6px 14px;background:rgba(230,177,126,.07);border-radius:0 6px 6px 0;color:var(--text-secondary)}
.thinking-box{background:linear-gradient(135deg,rgba(102,126,234,0.15),rgba(118,75,162,0.15));border:1px solid rgba(102,126,234,0.3);border-radius:10px;padding:12px 16px;margin-bottom:12px}
.thinking-label{font-size:11px;font-weight:700;color:#a0a0b0;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.thinking-box pre{background:none;padding:0;margin:0;font-size:12px;color:#c5c5d5;line-height:1.5;white-space:pre-wrap;word-break:break-all}
.msg-body hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.msg-body table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px}
.msg-body th{background:var(--bg-tertiary);color:var(--accent);padding:8px 12px;border:1px solid var(--border);text-align:left;font-weight:600}
.msg-body td{padding:7px 12px;border:1px solid var(--border)}
.msg-body tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.msg-body p{margin:6px 0}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text-muted)}
.empty-icon{font-size:56px;opacity:.25}
.empty-text{font-family:'Crimson Pro',serif;font-size:18px}

/* Typing indicator */
.typing-dots{display:flex;gap:5px;padding:14px 18px}
.typing-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:bounce 1.4s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.7}30%{transform:translateY(-9px);opacity:1}}

/* Input area */
.input-area{padding:14px 28px 18px;background:var(--bg-secondary);border-top:1px solid var(--border);flex-shrink:0}
.input-box{
  background:var(--bg-tertiary);border:1px solid var(--border);border-radius:13px;
  transition:border-color .2s,box-shadow .2s;overflow:hidden;position:relative
}
.input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(230,177,126,.1)}
.input-box.drag-over{border-color:var(--accent);background:rgba(230,177,126,.04)}
.attach-bar{display:none;flex-wrap:wrap;gap:7px;padding:10px 12px 6px;border-bottom:1px solid var(--border)}
.attach-bar.has-items{display:flex}
.attach-chip{display:flex;align-items:center;gap:6px;background:var(--bg-hover);border:1px solid var(--border);border-radius:7px;padding:4px 8px 4px 6px;max-width:190px}
.attach-thumb{width:30px;height:30px;border-radius:4px;object-fit:cover;flex-shrink:0}
.attach-icon{width:30px;height:30px;border-radius:4px;background:var(--bg-primary);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.attach-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.attach-size{font-size:10px;color:var(--text-muted)}
.attach-rm{width:16px;height:16px;background:rgba(224,92,92,.15);border:none;border-radius:50%;color:var(--danger);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;flex-shrink:0}
.attach-chip:hover .attach-rm{opacity:1}
.input-row{display:flex;align-items:flex-end;padding:9px 10px 9px 13px;gap:7px}
.msg-input{flex:1;padding:5px 3px;background:transparent;color:var(--text-primary);border:none;font-size:14px;font-family:'DM Sans',sans-serif;resize:none;min-height:26px;max-height:150px;outline:none;line-height:1.6}
.msg-input::placeholder{color:var(--text-muted)}
.attach-btn{width:34px;height:34px;background:none;border:1px solid var(--border);border-radius:7px;color:var(--text-muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.attach-btn:hover{border-color:var(--accent);color:var(--accent)}
.send-btn{padding:7px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg-primary);border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;flex-shrink:0;height:34px}
.send-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 12px rgba(230,177,126,.3)}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
.input-hint{font-size:11px;color:var(--text-muted);padding:0 13px 8px;display:flex;gap:12px;opacity:.8}
.drop-overlay{display:none;position:absolute;inset:0;background:rgba(230,177,126,.07);border:2px dashed var(--accent);border-radius:13px;align-items:center;justify-content:center;font-size:14px;color:var(--accent);font-weight:600;pointer-events:none;z-index:5}
.drop-overlay.show{display:flex}

/* Attachment in message */
.msg-attachments{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.msg-img{max-width:240px;max-height:180px;border-radius:7px;border:1px solid var(--border);object-fit:cover;cursor:pointer;transition:transform .2s}
.msg-img:hover{transform:scale(1.02)}
.msg-file{display:inline-flex;align-items:center;gap:6px;background:var(--bg-primary);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:12px;color:var(--text-secondary)}

/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:5000;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:92vh;border-radius:8px;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.lightbox-close{position:absolute;top:18px;right:22px;color:#fff;font-size:26px;cursor:pointer;background:rgba(255,255,255,.1);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lightbox-close:hover{background:rgba(255,255,255,.2)}

/* Scrollbar */
::-webkit-scrollbar{width:7px}
::-webkit-scrollbar-track{background:var(--bg-secondary)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--accent2)}

/* ── SETTINGS MODAL ───────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:2000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:16px;width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.modal-header{padding:22px 26px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:'Crimson Pro',serif;font-size:21px;color:var(--accent)}
.modal-close{width:30px;height:30px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;color:var(--text-secondary);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{border-color:var(--danger);color:var(--danger)}
.modal-body{padding:22px 26px}
.section-title{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:13px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.settings-section{margin-bottom:26px}
.form-group{margin-bottom:14px}
.input-eye{position:relative}
.input-eye .form-input{padding-right:44px}
.eye-btn{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;transition:color .2s;padding:3px}
.eye-btn:hover{color:var(--accent)}
.model-list{display:flex;flex-direction:column;gap:7px;margin-bottom:13px}
.model-item{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:7px}
.model-item-info{flex:1;min-width:0}
.model-item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.model-item-id{font-size:11px;color:var(--text-muted);font-family:'Courier New',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.model-del-btn,.model-edit-btn{width:26px;height:26px;background:none;border:1px solid transparent;border-radius:5px;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;flex-shrink:0}
.model-del-btn:hover{background:rgba(224,92,92,.15);border-color:var(--danger);color:var(--danger)}
.model-edit-btn:hover{background:rgba(99,179,237,.15);border-color:#63b3ed;color:#63b3ed}
.model-edit-row{display:flex;gap:6px;flex:1;align-items:center}
.model-edit-row input{flex:1;padding:6px 8px;background:var(--bg-primary);border:1px solid var(--border);border-radius:5px;color:var(--text-primary);font-size:12px;min-width:0}
.model-edit-row input:focus{outline:none;border-color:var(--accent)}
.add-model-row{display:grid;grid-template-columns:1fr 1fr auto;gap:7px;align-items:end}
.add-model-row .form-group{margin-bottom:0}
.add-btn{padding:11px 18px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg-primary);border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.add-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(230,177,126,.25)}
.modal-footer{padding:14px 26px 22px;display:flex;justify-content:flex-end;gap:9px}
.btn-cancel{padding:9px 22px;background:var(--bg-tertiary);color:var(--text-secondary);border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-cancel:hover{border-color:var(--text-secondary);color:var(--text-primary)}
.btn-save{padding:9px 22px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg-primary);border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(230,177,126,.25)}
.no-models{color:var(--text-muted);font-size:13px;text-align:center;padding:14px}

/* Rename inline modal */
.rename-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;align-items:center;justify-content:center}
.rename-modal-bg.open{display:flex}
.rename-modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:13px;padding:26px 28px;width:360px;max-width:95vw;box-shadow:0 16px 48px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.rename-modal h3{font-family:'Crimson Pro',serif;font-size:18px;color:var(--accent);margin-bottom:16px}
.rename-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}

/* Toast */
.toast{position:fixed;bottom:28px;right:28px;padding:11px 18px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:9px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:9999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:var(--success)}
.toast.error{border-color:var(--danger)}

/* Change password section */
.pw-section{margin-top:8px}
</style>
</head>
<body>

<!-- ══ AUTH SCREEN ══════════════════════════════════════════════════════════ -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">AI Studio</div>
    <div class="auth-sub">智能对话助手</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin"  onclick="switchAuthTab('login')">登 录</button>
      <button class="auth-tab"        id="tabReg"    onclick="switchAuthTab('register')">注 册</button>
    </div>
    <div class="form-group">
      <label class="form-label">用户名</label>
      <input class="form-input" id="authUser" placeholder="请输入用户名" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">密码</label>
      <input class="form-input" id="authPass" type="password" placeholder="请输入密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()">
    </div>
    <div id="authError" class="auth-error"></div>
    <button class="auth-btn" id="authBtn" onclick="doAuth()">登 录</button>
  </div>
</div>

<!-- ══ MAIN APP ══════════════════════════════════════════════════════════════ -->
<div class="app" id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">AI Studio</div>
      <div class="logo-sub">智能对话助手</div>
      <div class="user-badge">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-name"   id="userNameLabel">用户</div>
        <button class="logout-btn" onclick="logout()" title="退出登录">⏻</button>
      </div>
    </div>
    <button class="new-chat-btn" onclick="createNewChat()">✨ 新建对话</button>
    <div class="conv-list" id="convList"></div>
    <div class="sidebar-footer">
      <button class="sidebar-footer-btn" onclick="openSettings()">⚙ &nbsp;API 设置 / 模型管理</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="chat-header">
      <h2>对话</h2>
      <div class="header-right">
        <select class="model-select" id="modelSelect" onchange="onModelChange()"></select>
        <button class="settings-btn" onclick="openSettings()" title="设置">⚙</button>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="empty-state"><div class="empty-icon">💭</div><div class="empty-text">开始一段新的对话</div></div>
    </div>
    <div class="input-area">
      <div class="input-box" id="inputBox" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <div class="drop-overlay" id="dropOverlay">📎 松开以添加附件</div>
        <div class="attach-bar" id="attachBar"></div>
        <div class="input-row">
          <textarea class="msg-input" id="msgInput" placeholder="输入消息... (可粘贴图片)" rows="1"
            onkeydown="onInputKey(event)" oninput="autoResize(this)" onpaste="onPaste(event)"></textarea>
          <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="附件">📎</button>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
        <div class="input-hint"><span>Enter 发送 · Shift+Enter 换行</span><span>支持拖拽/粘贴图片</span></div>
      </div>
      <input type="file" id="fileInput" multiple style="display:none"
        accept=".bmp,.jpg,.jpeg,.png,.gif,.webp,.svg,.zip,.7z,.rar,.tar,.gz,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.pdf,.txt,.md,.csv,.html,.js,.css,.json,.conf,.lua,.py,.java,.go,.php,.xml,.yaml,.yml,.sql,.sh,.bat"
        onchange="onFileSelect(event)">
    </div>
  </div>
</div>

<!-- ══ CONVERSATION DROPDOWN ══════════════════════════════════════════════ -->
<div class="conv-dropdown" id="convDropdown">
  <button class="conv-dropdown-item" onclick="startRename()">✏️ &nbsp;重命名</button>
  <button class="conv-dropdown-item danger" onclick="confirmDelete()">🗑️ &nbsp;删除对话</button>
</div>

<!-- ══ RENAME MODAL ════════════════════════════════════════════════════════ -->
<div class="rename-modal-bg" id="renameModal">

        <div class="form-group">
          <label class="form-label">API Key</label>
          <div class="input-eye">
            <input class="form-input" id="cfgKey" type="password" placeholder="sk-...">
            <button class="eye-btn" id="eyeBtn" onclick="toggleEye()">👁</button>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="section-title">模型管理</div>

<!-- ══ TOAST ══════════════════════════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════════════════
const API = '';  // 同源部署，空字符串即可；如跨域填 'http://server:8000'

// ══════════════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════════════
let token     = sessionStorage.getItem('token') || '';
let username  = sessionStorage.getItem('username') || '';
let convList  = [];          // [{id,title,model,preview}]
let currentId = null;        // current conversation id
let messages  = [];          // current conversation messages (cache)
let tempModels = [];
let editingModelIndex = null; // index of model being edited, null if not editing
let dropdownTargetId = null; // conv id for three-dot menu

// ══════════════════════════════════════════════════════════════════════════
//  HTTP HELPERS
// ══════════════════════════════════════════════════════════════════════════
async function http(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', ...(token ? {'Authorization': `Bearer ${token}`} : {}) }
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok || !data.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data.data;
}
const GET    = (p)       => http('GET',    p);
const POST   = (p, b)    => http('POST',   p, b);
const PUT    = (p, b)    => http('PUT',    p, b);
const DELETE = (p)       => http('DELETE', p);

// ══════════════════════════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════════════════════════
let authMode = 'login';

function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
  document.getElementById('tabReg').classList.toggle('active', mode === 'register');
  document.getElementById('authBtn').textContent = mode === 'login' ? '登 录' : '注 册';
  document.getElementById('authError').style.display = 'none';
}

async function doAuth() {
  const user = document.getElementById('authUser').value.trim();
  const pass = document.getElementById('authPass').value.trim();
  const btn  = document.getElementById('authBtn');
  const errEl = document.getElementById('authError');
  errEl.style.display = 'none';
  if (!user || !pass) { showAuthError('请填写用户名和密码'); return; }
  btn.disabled = true; btn.textContent = '请稍候...';
  try {
    const path = authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
    const res  = await POST(path, { username: user, password: pass });
    token    = res.token;
    username = res.username;
    sessionStorage.setItem('token',    token);
    sessionStorage.setItem('username', username);
    bootApp();
  } catch(e) {
    showAuthError(e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? '登 录' : '注 册';
  }
}

function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.style.display = 'block';
}

function logout() {
  token = username = ''; currentId = null; messages = []; convList = [];
  sessionStorage.removeItem('token'); sessionStorage.removeItem('username');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('authUser').value = '';
  document.getElementById('authPass').value = '';
}

// ══════════════════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════════════════
async function bootApp() {
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  document.getElementById('userNameLabel').textContent = username;
  document.getElementById('userAvatar').textContent    = username[0].toUpperCase();
  await Promise.all([loadConfig(), loadConversations()]);
  if (convList.length > 0) {
    switchConv(convList[0].id);
  } else {
    await createNewChat();
  }
}

// ══════════════════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════════════════
let cfg = { api_base: '', api_key: '', models: [] };

async function loadConfig() {
  try { cfg = await GET('/api/config'); } catch(e) {}
  rebuildModelSelect();
}

function rebuildModelSelect(currentModel) {
  const sel = document.getElementById('modelSelect');
  sel.innerHTML = cfg.models.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
  if (currentModel) sel.value = currentModel;
}

function onModelChange() {
  if (!currentId) return;
  const conv = convList.find(c => c.id === currentId);
  if (conv) {
    conv.model = document.getElementById('modelSelect').value;
    PUT(`/api/conversations/${currentId}`, { model: conv.model }).catch(() => {});
  }
}

// ══════════════════════════════════════════════════════════════════════════
//  CONVERSATIONS
// ══════════════════════════════════════════════════════════════════════════
async function loadConversations() {
  try { convList = await GET('/api/conversations'); } catch(e) { convList = []; }
  renderConvList();
}

function renderConvList() {
  const el = document.getElementById('convList');
  if (!convList.length) {
    el.innerHTML = '<div style="padding:14px;font-size:12px;color:var(--text-muted);text-align:center">暂无对话</div>';
    return;
  }
  el.innerHTML = convList.map(c => `
    <div class="conv-item ${c.id === currentId ? 'active' : ''}" id="conv-${c.id}" onclick="switchConv(${c.id})">
      <div class="conv-title">${esc(c.title)}</div>
      <div class="conv-preview">${esc(c.preview || '无消息')}</div>
      <button class="conv-menu-btn" onclick="openConvMenu(event,${c.id})">⋮</button>
    </div>`).join('');
}

async function switchConv(id) {
  currentId = id;
  const conv = convList.find(c => c.id === id);
  if (conv) rebuildModelSelect(conv.model);
  renderConvList();
  await loadMessages(id);
}

async function loadMessages(id) {
  try {
    messages = await GET(`/api/conversations/${id}/messages`);
  } catch(e) { messages = []; }
  renderMessages();
}

async function createNewChat() {
  const model = document.getElementById('modelSelect').value || (cfg.models[0]?.id ?? 'gpt-4o');
  try {
    const c = await POST('/api/conversations', { title: '新对话', model });
    convList.unshift({ id: c.id, title: c.title, model: c.model, preview: '' });
    messages = [];
    currentId = c.id;
    renderConvList();
    renderMessages();
  } catch(e) { showToast('创建对话失败: ' + e.message, 'error'); }
}

// ══════════════════════════════════════════════════════════════════════════
//  THREE-DOT MENU
// ══════════════════════════════════════════════════════════════════════════
function openConvMenu(e, id) {
  e.stopPropagation();
  dropdownTargetId = id;
  const dd = document.getElementById('convDropdown');
  dd.classList.add('open');
  // Position near button
  const rect = e.currentTarget.getBoundingClientRect();
  dd.style.top  = (rect.bottom + 4) + 'px';
  dd.style.left = Math.min(rect.left, window.innerWidth - 160) + 'px';
}

document.addEventListener('click', () => {
  document.getElementById('convDropdown').classList.remove('open');
});

function startRename() {
  const conv = convList.find(c => c.id === dropdownTargetId);
  if (!conv) return;
  document.getElementById('renameInput').value = conv.title;
  document.getElementById('renameModal').classList.add('open');
  setTimeout(() => document.getElementById('renameInput').focus(), 50);
}

function closeRenameModal() {
  document.getElementById('renameModal').classList.remove('open');
}

async function confirmRename() {
  const title = document.getElementById('renameInput').value.trim();
  if (!title) return;
  try {
    await PUT(`/api/conversations/${dropdownTargetId}`, { title });
    const conv = convList.find(c => c.id === dropdownTargetId);
    if (conv) conv.title = title;
    renderConvList();
    closeRenameModal();
    showToast('已重命名', 'success');
  } catch(e) { showToast('重命名失败: ' + e.message, 'error'); }
}

async function confirmDelete() {
  if (!confirm('确认删除这条对话？此操作不可撤销。')) return;
  try {
    await DELETE(`/api/conversations/${dropdownTargetId}`);
    convList = convList.filter(c => c.id !== dropdownTargetId);
    if (currentId === dropdownTargetId) {
      messages = []; currentId = null;
      if (convList.length > 0) await switchConv(convList[0].id);
      else { renderMessages(); currentId = null; }
    }
    renderConvList();
    showToast('已删除', 'success');
  } catch(e) { showToast('删除失败: ' + e.message, 'error'); }
}

// ══════════════════════════════════════════════════════════════════════════
//  MESSAGES RENDER
// ══════════════════════════════════════════════════════════════════════════
function renderMessages() {
  const el = document.getElementById('messages');
  if (!messages.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">💭</div><div class="empty-text">开始一段新的对话</div></div>';
    return;
  }
  el.innerHTML = messages.map(m => {
    const text = m.display_text || (typeof m.content === 'string' ? m.content : '');
    const attachHtml = renderAttachHtml(m.attachments || []);

    // AI 回复特殊处理：提取 <thinking> 标签内容
    let msgContent = '';
    console.log('DEBUG role:', m.role, 'has thinking:', text.includes('<thinking>'), 'text length:', text.length);

    if (m.role === 'assistant' && text.includes('<thinking>')) {
      // 提取 thinking 标签内容
      const thinkRegex = /<thinking>([\s\S]*?)<\/thinking>/;
      const thinkMatch = text.match(thinkRegex);
      const thinking = thinkMatch ? thinkMatch[1].trim() : '';

      console.log('DEBUG thinking found:', thinking.substring(0, 50) + '...');

      // 移除 thinking 标签，得到正式回答（使用 g 标志全局替换）
      const afterReplace = text.replace(/<thinking>[\s\S]*?<\/thinking>/g, '[THINKING_REMOVED]');
      const mainText = afterReplace.replace('[THINKING_REMOVED]', '').replace(/^[\n\s]+/, '').replace(/[\n\s]+$/, '').trim();

      console.log('DEBUG after replace:', mainText.substring(0, 50) + '...');

      msgContent = thinking
        ? `<div class="thinking-box">💭 <span class="thinking-label">思考过程</span><pre>${esc(thinking)}</pre></div>${mainText ? md(mainText) : ''}`
        : md(text);
    } else {
      msgContent = text ? md(text) : '';
    }

    return `<div class="message ${m.role}-message">
      <div class="msg-header">
        <div class="msg-avatar ${m.role === 'user' ? 'user-avatar-msg' : 'ai-avatar-msg'}">${m.role === 'user' ? username[0].toUpperCase() : 'AI'}</div>
        <div class="msg-sender">${m.role === 'user' ? username : 'AI 助手'}</div>
      </div>
      <div class="msg-body">${attachHtml}${msgContent}</div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function renderAttachHtml(attachments) {
  if (!attachments.length) return '';
  return '<div class="msg-attachments">' + attachments.map(a => {
    if (a.fileType === 'image')
      return `<img class="msg-img" src="${a.dataUrl}" alt="${esc(a.name)}" onclick="openLightbox('${a.dataUrl}')">`;
    return `<div class="msg-file">${fileIcon(ext(a.name))} ${esc(a.name)}</div>`;
  }).join('') + '</div>';
}

// ══════════════════════════════════════════════════════════════════════════
//  SEND MESSAGE
// ══════════════════════════════════════════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text && !attachments.length) return;
  if (!currentId) await createNewChat();

  const model = document.getElementById('modelSelect').value;

  // Optimistic: add user message to UI
  const dispAttach = attachments.map(a => ({name:a.name,size:a.size,fileType:a.fileType,dataUrl:a.dataUrl}));
  messages.push({ role:'user', display_text:text, content:text, attachments:dispAttach });
  input.value = ''; input.style.height = 'auto';
  const sentAttach = [...attachments];
  attachments = []; renderAttachPreviews();
  renderMessages();

  // Typing indicator
  const msgEl = document.getElementById('messages');
  const typingEl = document.createElement('div');
  typingEl.className = 'message ai-message';
  typingEl.innerHTML = `<div class="msg-header"><div class="msg-avatar ai-avatar-msg">AI</div><div class="msg-sender">AI 助手</div></div><div class="msg-body"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  msgEl.appendChild(typingEl);
  msgEl.scrollTop = msgEl.scrollHeight;

  document.getElementById('sendBtn').disabled = true;

  try {
    const result = await POST('/api/chat', {
      conversation_id: currentId,
      text, model,
      attachments: sentAttach.map(a => ({name:a.name,size:a.size,fileType:a.fileType,dataUrl:a.dataUrl,textContent:a.textContent||''}))
    });

    msgEl.removeChild(typingEl);
    messages.push({ role:'assistant', display_text:result.reply, content:result.reply, attachments:[] });
    renderMessages();

    // Update preview in sidebar
    const conv = convList.find(c => c.id === currentId);
    if (conv) {
      if (conv.title === '新对话' && text) conv.title = text.substring(0,30);
      conv.preview = result.reply.substring(0,60);
      // Move to top
      convList = [conv, ...convList.filter(c => c.id !== currentId)];
      renderConvList();
    }
  } catch(e) {
    msgEl.removeChild(typingEl);
    messages.pop(); // remove optimistic user message
    renderMessages();
    showToast('发送失败: ' + e.message, 'error');
  } finally {
    document.getElementById('sendBtn').disabled = false;
  }
}

// ══════════════════════════════════════════════════════════════════════════
//  SETTINGS
// ══════════════════════════════════════════════════════════════════════════
function openSettings() {
  document.getElementById('cfgBase').value = cfg.api_base || '';
  document.getElementById('cfgKey').value  = cfg.api_key  || '';
  tempModels = cfg.models.map(m => ({...m}));
  editingModelIndex = null; // 重置编辑状态
  renderModelList();
  document.getElementById('pwOld').value = '';
  document.getElementById('pwNew').value = '';
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }

function toggleEye() {
  const inp = document.getElementById('cfgKey');
  const btn = document.getElementById('eyeBtn');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function renderModelList() {
  const el = document.getElementById('modelList');
  if (!tempModels.length) { el.innerHTML = '<div class="no-models">暂无模型</div>'; return; }
  el.innerHTML = tempModels.map((m,i) => {
    if (editingModelIndex === i) {
      // 编辑模式
      return `
        <div class="model-item">
          <div class="model-edit-row">
            <input type="text" id="editMName" value="${esc(m.name)}" placeholder="模型名称">
            <input type="text" id="editMId" value="${esc(m.id)}" placeholder="模型 ID">
          </div>
          <button class="model-edit-btn" onclick="saveEditModel(${i})" title="保存">✓</button>
          <button class="model-del-btn" onclick="cancelEditModel()" title="取消">✕</button>
        </div>`;
    }
    // 普通模式
    return `
      <div class="model-item">
        <div class="model-item-info">
          <div class="model-item-name">${esc(m.name)}</div>
          <div class="model-item-id">${esc(m.id)}</div>
        </div>
        <button class="model-edit-btn" onclick="startEditModel(${i})" title="编辑">✎</button>
        <button class="model-del-btn" onclick="delModel(${i})">✕</button>
      </div>`;
  }).join('');
}

function addModel() {
  const name = document.getElementById('newMName').value.trim();
  const id   = document.getElementById('newMId').value.trim();
  if (!name || !id) { showToast('请填写名称和模型 ID', 'error'); return; }
  if (tempModels.find(m => m.id === id)) { showToast('模型 ID 已存在', 'error'); return; }
  tempModels.push({name, id});
  renderModelList();
  document.getElementById('newMName').value = '';
  document.getElementById('newMId').value   = '';
}

function delModel(i) { tempModels.splice(i, 1); renderModelList(); }

function startEditModel(i) {
  editingModelIndex = i;
  renderModelList();
  setTimeout(() => {
    document.getElementById('editMName')?.focus();
  }, 50);
}

function saveEditModel(i) {
  const name = document.getElementById('editMName').value.trim();
  const id   = document.getElementById('editMId').value.trim();
  if (!name || !id) { showToast('请填写名称和模型 ID', 'error'); return; }
  // 检查是否与其他模型 ID 重复（排除自己）
  if (tempModels.find((m, idx) => m.id === id && idx !== i)) {
    showToast('模型 ID 已存在', 'error'); return;
  }
  tempModels[i] = {name, id};
  editingModelIndex = null;
  renderModelList();
  showToast('✓ 模型已更新', 'success');
}

function cancelEditModel() {
  editingModelIndex = null;
  renderModelList();
}

async function saveSettings() {
  const api_base = document.getElementById('cfgBase').value.trim();
  const api_key  = document.getElementById('cfgKey').value.trim();
  if (!api_base) { showToast('API Base URL 不能为空', 'error'); return; }
  if (!api_key)  { showToast('API Key 不能为空', 'error'); return; }
  if (!tempModels.length) { showToast('至少需要一个模型', 'error'); return; }
  try {
    await PUT('/api/config', { api_base, api_key, models: tempModels });
    cfg = { api_base, api_key, models: tempModels };
    const cur = document.getElementById('modelSelect').value;
    rebuildModelSelect(cur);
    closeSettings();
    showToast('✓ 设置已保存', 'success');
  } catch(e) { showToast('保存失败: ' + e.message, 'error'); }
}

async function changePassword() {
  const old_pw = document.getElementById('pwOld').value.trim();
  const new_pw = document.getElementById('pwNew').value.trim();
  if (!old_pw || !new_pw) { showToast('请填写原密码和新密码', 'error'); return; }
  try {
    await POST('/api/auth/change-password', { old_password: old_pw, new_password: new_pw });
    document.getElementById('pwOld').value = '';
    document.getElementById('pwNew').value = '';
    showToast('✓ 密码已修改', 'success');
  } catch(e) { showToast('修改失败: ' + e.message, 'error'); }
}

// ══════════════════════════════════════════════════════════════════════════
//  ATTACHMENTS
// ══════════════════════════════════════════════════════════════════════════
let attachments = [];
const IMG_EXTS  = ['bmp','jpg','jpeg','png','gif','webp','svg'];
const TXT_EXTS  = ['txt','md','csv','html','js','css','json','conf','lua','py','java','go','php','xml','yaml','yml','sql','sh','bat'];
const ICONS = {zip:'🗜️','7z':'🗜️',rar:'🗜️',tar:'🗜️',gz:'🗜️',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📑',pptx:'📑',pdf:'📄',txt:'📃',md:'📃',csv:'📊',html:'🌐',js:'🟨',css:'🎨',json:'🧩',conf:'⚙️',lua:'🌙',py:'🐍',java:'☕',go:'🐹',php:'🐘',xml:'🧾',yaml:'📘',yml:'📘',sql:'🗄️',sh:'🖥️',bat:'🖥️',svg:'🖼️'};

function ext(name) { return name.split('.').pop().toLowerCase(); }
function fileIcon(e) { return ICONS[e] || '📎'; }
function fmtSize(b) { return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB'; }
function classifyFile(name) { const e=ext(name); return IMG_EXTS.includes(e)?'image':TXT_EXTS.includes(e)?'text':'binary'; }
const readDataUrl = f => new Promise((r,j) => { const x=new FileReader(); x.onload=e=>r(e.target.result); x.onerror=j; x.readAsDataURL(f); });
const readText    = f => new Promise((r,j) => { const x=new FileReader(); x.onload=e=>r(e.target.result); x.onerror=j; x.readAsText(f,'UTF-8'); });

async function addFiles(files) {
  for (const f of files) {
    if (attachments.length >= 10) { showToast('最多 10 个附件', 'error'); break; }
    const ft = classifyFile(f.name);
    const dataUrl = await readDataUrl(f);
    const textContent = ft === 'text' ? await readText(f) : null;
    attachments.push({id:Date.now()+Math.random(), name:f.name, size:f.size, fileType:ft, dataUrl, textContent});
  }
  renderAttachPreviews();
}

function renderAttachPreviews() {
  const bar = document.getElementById('attachBar');
  if (!attachments.length) { bar.innerHTML=''; bar.classList.remove('has-items'); return; }
  bar.classList.add('has-items');
  bar.innerHTML = attachments.map(a => `
    <div class="attach-chip">
      ${a.fileType==='image'
        ? `<img class="attach-thumb" src="${a.dataUrl}">`
        : `<div class="attach-icon">${fileIcon(ext(a.name))}</div>`}
      <div><div class="attach-name">${esc(a.name)}</div><div class="attach-size">${fmtSize(a.size)}</div></div>
      <button class="attach-rm" onclick="rmAttach(${a.id})">✕</button>
    </div>`).join('');
}

function rmAttach(id) { attachments=attachments.filter(a=>a.id!==id); renderAttachPreviews(); }
function onFileSelect(e) { addFiles([...e.target.files]); e.target.value=''; }
function onPaste(e) {
  const imgs=[]; for(const item of (e.clipboardData?.items||[])) {
    if(item.type.startsWith('image/')){ const f=item.getAsFile(); if(f){ Object.defineProperty(f,'name',{value:`paste_${Date.now()}.${item.type.split('/')[1]||'png'}`}); imgs.push(f); } }
  }
  if(imgs.length){ e.preventDefault(); addFiles(imgs); }
}
function onDragOver(e) { e.preventDefault(); document.getElementById('inputBox').classList.add('drag-over'); document.getElementById('dropOverlay').classList.add('show'); }
function onDragLeave(e) { if(!document.getElementById('inputBox').contains(e.relatedTarget)){ document.getElementById('inputBox').classList.remove('drag-over'); document.getElementById('dropOverlay').classList.remove('show'); } }
function onDrop(e) { e.preventDefault(); document.getElementById('inputBox').classList.remove('drag-over'); document.getElementById('dropOverlay').classList.remove('show'); addFiles([...e.dataTransfer.files]); }

// ══════════════════════════════════════════════════════════════════════════
//  MARKDOWN RENDERER
// ══════════════════════════════════════════════════════════════════════════
function md(raw) {
  const blocks=[]; let s=raw.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>{const i=blocks.length;blocks.push(`<pre><code class="lang-${l}">${esc(c.replace(/\n$/,''))}</code></pre>`);return`\x00B${i}\x00`;});
  const inlines=[]; s=s.replace(/`([^`]+)`/g,(_,c)=>{const i=inlines.length;inlines.push(`<code>${esc(c)}</code>`);return`\x00I${i}\x00`;});
  const lines=s.split('\n'); const out=[]; let i=0;
  while(i<lines.length){
    const l=lines[i];
    const m4=l.match(/^####\s+(.*)/),m3=l.match(/^###\s+(.*)/),m2=l.match(/^##\s+(.*)/),m1=l.match(/^#\s+(.*)/);
    if(m4){out.push(`<h4>${inl(m4[1])}</h4>`);i++;continue}
    if(m3){out.push(`<h3>${inl(m3[1])}</h3>`);i++;continue}
    if(m2){out.push(`<h2>${inl(m2[1])}</h2>`);i++;continue}
    if(m1){out.push(`<h1>${inl(m1[1])}</h1>`);i++;continue}
    if(/^[-*_]{3,}$/.test(l.trim())){out.push('<hr>');i++;continue}
    if(l.startsWith('> ')){out.push(`<blockquote>${inl(l.slice(2))}</blockquote>`);i++;continue}
    if(l.includes('|')&&i+1<lines.length&&/^\|?[-| :]+\|?$/.test(lines[i+1])){const t=[];while(i<lines.length&&lines[i].includes('|')){t.push(lines[i]);i++;}out.push(tbl(t));continue}
    if(/^[-*+]\s/.test(l)){const it=[];while(i<lines.length&&/^[-*+]\s/.test(lines[i])){it.push(`<li>${inl(lines[i].replace(/^[-*+]\s/,''))}</li>`);i++;}out.push(`<ul>${it.join('')}</ul>`);continue}
    if(/^\d+\.\s/.test(l)){const it=[];while(i<lines.length&&/^\d+\.\s/.test(lines[i])){it.push(`<li>${inl(lines[i].replace(/^\d+\.\s/,''))}</li>`);i++;}out.push(`<ol>${it.join('')}</ol>`);continue}
    if(/^\x00B\d+\x00$/.test(l.trim())){out.push(l.trim());i++;continue}
    if(l.trim()===''){out.push('');i++;continue}
    out.push(`<p>${inl(l)}</p>`);i++;
  }
  let html=out.join('\n');
  blocks.forEach((b,i)=>html=html.replace(`\x00B${i}\x00`,b));
  inlines.forEach((b,i)=>html=html.replace(`\x00I${i}\x00`,b));
  return html;
}
function inl(t){
  t=t.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/__(.+?)__/g,'<strong>$1</strong>');
  t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  t=t.replace(/_(.+?)_/g,'<em>$1</em>');
  t=t.replace(/~~(.+?)~~/g,'<del>$1</del>');
  t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" style="color:var(--accent)">$1</a>');
  return t;
}
function tbl(lines){
  const pr=l=>l.replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
  const rows=lines.filter((_,i)=>!/^[\|: -]+$/.test(lines[i]));
  if(!rows.length)return'';
  const h=pr(rows[0]),body=rows.slice(1);
  return`<table><thead><tr>${h.map(c=>`<th>${inl(c)}</th>`).join('')}</tr></thead><tbody>${body.map(r=>`<tr>${pr(r).map(c=>`<td>${inl(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let toastT;
function showToast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show'+(type?' '+type:'');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2800);
}
