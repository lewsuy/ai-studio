<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Studio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<link rel="stylesheet" href="/static/css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="/static/js/app.js"></script>
</head>
<body>

<!-- ══ AUTH SCREEN ══════════════════════════════════════════════════════════ -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">AI Studio</div>
    <div class="auth-sub">智能对话助手</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin"  onclick="switchAuthTab('login')">登 录</button>
      <button class="auth-tab"        id="tabReg"    onclick="switchAuthTab('register')">注 册</button>
    </div>
    <div class="form-group">
      <label class="form-label">用户名</label>
      <input class="form-input" id="authUser" placeholder="请输入用户名" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">密码</label>
      <input class="form-input" id="authPass" type="password" placeholder="请输入密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()">
    </div>
    <div id="authError" class="auth-error"></div>
    <button class="auth-btn" id="authBtn" onclick="doAuth()">登 录</button>
  </div>
</div>

<!-- ══ MAIN APP ══════════════════════════════════════════════════════════════ -->
<div class="app" id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">AI Studio</div>
      <div class="logo-sub">智能对话助手</div>
      <div class="user-badge">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-name"   id="userNameLabel">用户</div>
        <button class="logout-btn" onclick="logout()" title="退出登录">⏻</button>
      </div>
    </div>
    <button class="new-chat-btn" onclick="createNewChat()">✨ 新建对话</button>
    <div class="conv-list" id="convList"></div>
    <div class="sidebar-footer">
      <button class="sidebar-footer-btn" onclick="openSettings()">⚙ &nbsp;API 设置 / 模型管理</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="chat-header">
      <h2>对话</h2>
      <div class="header-right">
        <button class="theme-btn" id="themeBtn" title="切换主题" onclick="cycleTheme()">
          <svg id="themeIconDark" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
          <svg id="themeIconLight" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5" fill="currentColor" stroke="none"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
        <select class="model-select" id="modelSelect" onchange="onModelChange()"></select>
        <button class="settings-btn" onclick="openSettings()" title="设置">⚙</button>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="empty-state"><div class="empty-icon">💭</div><div class="empty-text">开始一段新的对话</div></div>
    </div>
    <div class="input-area">
      <div class="input-box" id="inputBox" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <div class="drop-overlay" id="dropOverlay">📎 松开以添加附件</div>
        <div class="attach-bar" id="attachBar"></div>
        <div class="input-row">
          <textarea class="msg-input" id="msgInput" placeholder="输入消息... (可粘贴图片)" rows="1"
            onkeydown="onInputKey(event)" oninput="autoResize(this)" onpaste="onPaste(event)"></textarea>
          <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="附件">📎</button>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
        <div class="input-hint"><span>Enter 发送 · Shift+Enter 换行</span><span>支持拖拽/粘贴图片</span></div>
      </div>
      <input type="file" id="fileInput" multiple style="display:none"
        accept=".bmp,.jpg,.jpeg,.png,.gif,.webp,.svg,.zip,.7z,.rar,.tar,.gz,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.pdf,.txt,.md,.csv,.html,.js,.css,.json,.conf,.lua,.py,.java,.go,.php,.xml,.yaml,.yml,.sql,.sh,.bat"
        onchange="onFileSelect(event)">
    </div>
  </div>
</div>

<!-- ══ CONVERSATION DROPDOWN ══════════════════════════════════════════════ -->
<div class="conv-dropdown" id="convDropdown">
  <button class="conv-dropdown-item" onclick="startRename()">✏️ &nbsp;重命名</button>
  <button class="conv-dropdown-item danger" onclick="confirmDelete()">🗑️ &nbsp;删除对话</button>
</div>

<!-- ══ RENAME MODAL ════════════════════════════════════════════════════════ -->
<div class="rename-modal-bg" id="renameModal">
  <div class="rename-modal">
    <h3>重命名对话</h3>
    <div class="form-group" style="margin-bottom:0">
      <label class="form-label">对话名称</label>
      <input class="form-input" id="renameInput" placeholder="输入新名称" onkeydown="if(event.key==='Enter')confirmRename()">
    </div>
    <div class="rename-actions">
      <button class="btn-cancel" onclick="closeRenameModal()">取消</button>
      <button class="btn-save"   onclick="confirmRename()">确认</button>
    </div>
  </div>
</div>

<!-- ══ SETTINGS MODAL ═════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">⚙ 系统设置</div>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="settings-section">
        <div class="section-title">API 配置</div>
        <div class="form-group">
          <label class="form-label">API Base URL</label>
          <input class="form-input" id="cfgBase" placeholder="https://api.openai.com/v1">
        </div>
        <div class="form-group">
          <label class="form-label">API Key</label>
          <div class="input-eye">
            <input class="form-input" id="cfgKey" type="password" placeholder="sk-...">
            <button class="eye-btn" id="eyeBtn" onclick="toggleEye()">👁</button>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="section-title">模型管理</div>
        <div class="model-list" id="modelList"></div>
        <div class="add-model-row">
          <div class="form-group"><label class="form-label">显示名称</label><input class="form-input" id="newMName" placeholder="GPT-4o"></div>
          <div class="form-group"><label class="form-label">模型 ID</label><input class="form-input" id="newMId" placeholder="gpt-4o"></div>
          <button class="add-btn" onclick="addModel()">＋ 添加</button>
        </div>
      </div>
      <div class="settings-section pw-section">
        <div class="section-title">修改密码</div>
        <div class="form-group"><label class="form-label">原密码</label><input class="form-input" id="pwOld" type="password" placeholder="原密码"></div>
        <div class="form-group"><label class="form-label">新密码</label><input class="form-input" id="pwNew" type="password" placeholder="新密码（至少6位）"></div>
        <button class="add-btn" style="width:100%;margin-top:4px" onclick="changePassword()">修改密码</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeSettings()">取消</button>
      <button class="btn-save"   onclick="saveSettings()">保存设置</button>
    </div>
  </div>
</div>

<!-- ══ LIGHTBOX ═══════════════════════════════════════════════════════════ -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- ══ TOAST ══════════════════════════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

</body>
</html>
